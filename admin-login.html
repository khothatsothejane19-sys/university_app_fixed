<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — UniApply SA</title>
   <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="logo-mark-lg">U</div>
    <h2>Admin Portal</h2>
    <p>Univio SA — Secure Admin Access</p>

    <div class="login-error" id="loginError"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="adminEmail" placeholder="admin@uniapplysa.co.za" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div style="position:relative">
        <input type="password" class="form-input" id="adminPassword" placeholder="••••••••••" />
        <button id="eyeBtn" type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;color:var(--grey-mid);font-size:0.9rem;cursor:pointer;border:none">👁️</button>
      </div>
    </div>

    <button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:6px;font-size:1rem;padding:15px" id="loginBtn">
      Sign In to Admin
    </button>

    <p style="text-align:center;margin-top:20px;font-size:0.8rem;color:var(--grey-mid)">
      <a href="index.html" style="color:var(--grey-mid);text-decoration:underline">← Back to main site</a>
    </p>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module" src="./js/admin-login.js"></script>
<script type="module" src="./js/firebase-config.js"></script>
<script type="module" src="./js/app.js"></script>
</body>
</html>
