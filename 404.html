<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#007A4D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Univio SA" />
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Page Not Found — UniApply SA</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      background: var(--off-black);
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 40px 5%;
    }
    .error-inner { max-width: 500px; }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--green), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 1.8rem; font-weight: 700;
      color: var(--white); margin: 16px 0 12px;
    }
    .error-msg { color: var(--grey-mid); line-height: 1.7; margin-bottom: 32px; }
    .error-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="error-page">
  <div class="error-inner">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-msg">The page you're looking for doesn't exist or has been moved. Head back to find a university that's right for you.</p>
    <div class="error-links">
      <a href="index.html" class="btn btn-gold" style="display:inline-flex;align-items:center;gap:6px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go Home
      </a>
      <a href="universities.html" class="btn btn-outline" style="display:inline-flex;align-items:center;gap:6px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        Browse Universities
      </a>
    </div>
  </div>
</div>

<!-- PWA Install Banner -->
<div id="pwaInstallBanner">
  <div class="pwa-banner-icon">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
  </div>
  <div class="pwa-banner-text">
    <strong>Install Univio SA</strong>
    <span>Add to your home screen for quick access — no app store needed.</span>
  </div>
  <div class="pwa-banner-actions">
    <button class="pwa-install-btn" id="pwaInstallBtn">Install App</button>
    <button class="pwa-dismiss-btn" id="pwaDismissBtn">Not now</button>
  </div>
</div>

<!-- Community Chat -->
<script type="module" src="./js/chat.js"></script>

<!-- PWA install prompt logic -->
<script>
(function() {
  let deferredPrompt = null;
  const DISMISSED_KEY = "univio_pwa_dismissed";

  window.addEventListener("beforeinstallprompt", e => {
    e.preventDefault();
    deferredPrompt = e;
    if (!localStorage.getItem(DISMISSED_KEY)) {
      setTimeout(() => {
        const banner = document.getElementById("pwaInstallBanner");
        if (banner) banner.classList.add("visible");
      }, 3000);
    }
  });

  window.addEventListener("appinstalled", () => {
    const banner = document.getElementById("pwaInstallBanner");
    if (banner) banner.classList.remove("visible");
    deferredPrompt = null;
  });

  document.addEventListener("DOMContentLoaded", () => {
    const installBtn  = document.getElementById("pwaInstallBtn");
    const dismissBtn  = document.getElementById("pwaDismissBtn");

    installBtn?.addEventListener("click", async () => {
      const banner = document.getElementById("pwaInstallBanner");
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === "accepted") {
          if (banner) banner.classList.remove("visible");
        }
        deferredPrompt = null;
      }
    });

    dismissBtn?.addEventListener("click", () => {
      const banner = document.getElementById("pwaInstallBanner");
      if (banner) banner.classList.remove("visible");
      localStorage.setItem(DISMISSED_KEY, "1");
    });
  });
})();
</script>
</body>
</html>
